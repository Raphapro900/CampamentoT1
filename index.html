<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Undertale · Campamento · Historia Interactiva</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: radial-gradient(circle at 30% 20%, #0a0f1a, #020202);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Determination', 'Courier New', monospace;
            overflow: hidden;
            position: relative;
        }

        @font-face {
            font-family: 'Determination';
            src: url('https://fonts.cdnfonts.com/s/17018/DeterminationMonoWeb.woff') format('woff');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        .game-wrapper {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000000aa;
            backdrop-filter: blur(3px);
        }

        .dialog-panel {
            background: #000000dd;
            border: 4px solid #ffffff;
            border-radius: 32px;
            padding: 2rem 2.2rem;
            max-width: 850px;
            width: 90%;
            text-align: center;
            box-shadow: 0 0 40px rgba(255, 240, 150, 0.3);
            transition: 0.2s;
        }

        .dialog-text {
            color: #f5f5f5;
            font-size: 1.85rem;
            font-family: 'Determination', monospace;
            letter-spacing: 1px;
            text-shadow: 0 0 3px #fff9;
            min-height: 130px;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.4;
            margin-bottom: 25px;
        }

        .input-zone {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        input {
            background: #111;
            border: 2px solid #fff;
            padding: 14px 20px;
            font-size: 1.7rem;
            font-family: 'Determination', monospace;
            color: #ffe484;
            text-align: center;
            outline: none;
            width: 280px;
            border-radius: 60px;
        }

        input:focus {
            border-color: #ffcc55;
            box-shadow: 0 0 15px #ffcc55;
        }

        button {
            background: #000000;
            border: 2px solid #ffffff;
            color: white;
            font-family: 'Determination', monospace;
            font-size: 1.5rem;
            padding: 10px 28px;
            margin: 8px 12px;
            cursor: pointer;
            border-radius: 60px;
            transition: all 0.2s;
        }

        button:hover {
            background: #ffffff;
            color: #000000;
            transform: scale(1.02);
            border-color: #ffdd88;
        }

        .button-row {
            display: flex;
            gap: 25px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .dot-loader::after {
            content: '';
            animation: dotsAnim 1.2s steps(3, end) infinite;
            display: inline-block;
            width: 1.4em;
            text-align: left;
        }

        @keyframes dotsAnim {
            0% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
            100% { content: ''; }
        }

        .zoom-green {
            animation: bounceGreen 0.6s cubic-bezier(0.34, 1.2, 0.64, 1) forwards;
            display: inline-block;
            color: #6eff6e !important;
            text-shadow: 0 0 8px #00ff48;
        }

        @keyframes bounceGreen {
            0% { transform: scale(0.9); color: white; }
            60% { transform: scale(1.25); color: #bbff99; }
            100% { transform: scale(1); color: #57ff57; }
        }

        .beta-cinematic {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000f0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            font-family: 'Determination', monospace;
            backdrop-filter: blur(4px);
            pointer-events: none;
            animation: vanishOverlay 3.5s forwards;
        }

        .beta-line1 {
            font-size: 2.4rem;
            color: white;
            text-align: center;
            margin: 8px;
            animation: riseUp 1s ease-out forwards;
        }

        .beta-line1 span {
            color: #ffcc44;
            font-size: 3rem;
            text-shadow: 0 0 8px #ffaa33;
        }

        .beta-line2 {
            font-size: 2rem;
            margin-top: 15px;
            animation: appearLate 0.9s ease-out 0.7s forwards;
            opacity: 0;
            transform: translateY(25px);
            color: #dddddd;
        }

        @keyframes riseUp {
            0% { opacity: 1; transform: translateY(0);}
            80% { opacity: 1; transform: translateY(-28px);}
            100% { opacity: 0; transform: translateY(-60px); visibility: hidden;}
        }

        @keyframes appearLate {
            0% { opacity: 0; transform: translateY(28px);}
            100% { opacity: 1; transform: translateY(0);}
        }

        @keyframes vanishOverlay {
            0% { opacity: 1; visibility: visible; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; display: none; }
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
<div class="game-wrapper" id="gameRoot">
    <div class="dialog-panel" id="dialogPanel">
        <div class="dialog-text" id="messageBox"></div>
        <div id="inputArea" class="input-zone"></div>
    </div>
</div>

<script>
    // ========== SONIDO DE TEXTO (beep undertale) ==========
    class TextBeeper {
        constructor() {
            this.audioCtx = null;
            this.active = true;
            try {
                this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            } catch(e) { this.active = false; }
        }
        resume() {
            if (this.audioCtx && this.audioCtx.state === 'suspended') this.audioCtx.resume();
        }
        beep() {
            if (!this.active || !this.audioCtx) return;
            if (this.audioCtx.state === 'suspended') this.audioCtx.resume();
            const osc = this.audioCtx.createOscillator();
            const gain = this.audioCtx.createGain();
            osc.connect(gain);
            gain.connect(this.audioCtx.destination);
            osc.type = 'square';
            osc.frequency.value = 880;
            gain.gain.value = 0.09;
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, this.audioCtx.currentTime + 0.1);
            osc.stop(this.audioCtx.currentTime + 0.09);
        }
    }
    const soundFx = new TextBeeper();

    // Typwriter con sonido
    async function writeMessage(element, text, speed = 45, soundOn = true) {
        element.textContent = '';
        for (let i = 0; i < text.length; i++) {
            element.textContent += text[i];
            if (soundOn && soundFx) soundFx.beep();
            await new Promise(r => setTimeout(r, speed));
        }
        return true;
    }

    // UI Elements
    const msgDiv = document.getElementById("messageBox");
    const inputZone = document.getElementById("inputArea");

    function clearInputZone() {
        inputZone.innerHTML = "";
    }

    // Mostrar mensaje normal (auto-siguiente)
    async function showMsg(text, autoNext = true, delay = 750) {
        clearInputZone();
        await writeMessage(msgDiv, text, 43, true);
        if (autoNext) await new Promise(r => setTimeout(r, delay));
        return true;
    }

    // Mostrar mensaje con botones Sí / No
    async function showChoice(message, onYes, onNo) {
        clearInputZone();
        await writeMessage(msgDiv, message, 45, true);
        const btnGroup = document.createElement("div");
        btnGroup.className = "button-row";
        const yesBtn = document.createElement("button");
        yesBtn.textContent = "SÍ";
        const noBtn = document.createElement("button");
        noBtn.textContent = "NO";
        btnGroup.appendChild(yesBtn);
        btnGroup.appendChild(noBtn);
        inputZone.appendChild(btnGroup);
        
        const handlerYes = () => {
            soundFx.beep();
            clearInputZone();
            yesBtn.removeEventListener("click", handlerYes);
            noBtn.removeEventListener("click", handlerNo);
            onYes();
        };
        const handlerNo = () => {
            soundFx.beep();
            clearInputZone();
            yesBtn.removeEventListener("click", handlerYes);
            noBtn.removeEventListener("click", handlerNo);
            onNo();
        };
        yesBtn.addEventListener("click", handlerYes);
        noBtn.addEventListener("click", handlerNo);
    }

    // Input para escribir nombre
    async function askName(promptText, callback) {
        clearInputZone();
        await writeMessage(msgDiv, promptText, 48, true);
        const nameInput = document.createElement("input");
        nameInput.type = "text";
        nameInput.maxLength = 14;
        nameInput.autocomplete = "off";
        nameInput.placeholder = "...";
        const submitBtn = document.createElement("button");
        submitBtn.textContent = "Aceptar";
        inputZone.appendChild(nameInput);
        inputZone.appendChild(submitBtn);
        nameInput.focus();
        const finish = () => {
            let val = nameInput.value.trim();
            if (val === "") val = "Viajero";
            soundFx.beep();
            clearInputZone();
            callback(val);
        };
        submitBtn.onclick = finish;
        nameInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") finish();
        });
    }

    // animación de carga: "Empezando..." + "Carga completa" verde
    async function loadingSequence() {
        clearInputZone();
        let dots = 0;
        msgDiv.innerHTML = "Empezando";
        const interval = setInterval(() => {
            dots = (dots + 1) % 4;
            let dotStr = ".".repeat(dots);
            msgDiv.innerHTML = `Empezando${dotStr}`;
        }, 450);
        await new Promise(r => setTimeout(r, 2800));
        clearInterval(interval);
        msgDiv.innerHTML = "Carga completa";
        msgDiv.classList.add("zoom-green");
        await new Promise(r => setTimeout(r, 650));
        msgDiv.classList.remove("zoom-green");
        await new Promise(r => setTimeout(r, 250));
    }

    // Pantalla de "Beta" animada estilo Undertale
    function displayBetaMessage() {
        if (document.querySelector(".beta-cinematic")) return;
        const overlay = document.createElement("div");
        overlay.className = "beta-cinematic";
        overlay.innerHTML = `
            <div class="beta-line1">Este juego está en fase <span>Beta</span></div>
            <div class="beta-line2">La versión completa pronto</div>
        `;
        document.body.appendChild(overlay);
        setTimeout(() => {
            if (overlay && overlay.remove) overlay.remove();
        }, 3600);
    }

    // ================ ALMACENAMIENTO LOCAL PARA NOMBRE Y FECHAS ================
    function savePlayerData(name, dateStr) {
        localStorage.setItem("camp_nombre", JSON.stringify({ nombre: name, fecha: dateStr }));
        localStorage.setItem("camp_fecha_mem", dateStr);
    }
    function getStoredNameData() {
        const raw = localStorage.getItem("camp_nombre");
        if (raw) {
            try { return JSON.parse(raw); } catch(e) { return null; }
        }
        return null;
    }
    function getMemoryDate() {
        return localStorage.getItem("camp_fecha_mem");
    }
    function setMemoryDate(date) {
        localStorage.setItem("camp_fecha_mem", date);
    }

    // ==================== JUEGO PRINCIPAL (historia de fogata, serpientes, osos) ====================
    let currentPlayer = "";
    let retryAttempt = false;

    async function startGameStory() {
        // 1. Bienvenida y manejo de nombre estilo "campamento"
        const stored = getStoredNameData();
        const today = new Date().toLocaleString();
        
        if (stored && stored.nombre) {
            const fechaGuardada = stored.fecha;
            const fechaMemoria = getMemoryDate();
            if (fechaGuardada === fechaMemoria && fechaMemoria !== null) {
                currentPlayer = stored.nombre;
                await showMsg(`Hola ${currentPlayer} volviste`, true, 850);
            } else {
                currentPlayer = stored.nombre;
                await showMsg("Oye...", true, 700);
                await showMsg("¿Por qué tu fecha de nombre es distinta a la que recuerdo?", true, 950);
                await showMsg("¿Viajas en el pasado o en el futuro?", true, 900);
                await showMsg("O tal vez lo cambiaste...", true, 800);
                await showMsg(`Bueno ${currentPlayer}, qué importa, sigamos`, true, 850);
                await showMsg(`Hola ${currentPlayer}, un gusto en conocerte.`, true, 900);
            }
        } else {
            // Primera vez: pedir nombre
            await new Promise(resolve => {
                askName("Escribe tu nombre en el teclado", async (nombre) => {
                    currentPlayer = nombre;
                    await showMsg(`Te llamarás ${currentPlayer}`, true, 750);
                    const nowDate = new Date().toLocaleString();
                    savePlayerData(currentPlayer, nowDate);
                    setMemoryDate(nowDate);
                    await showMsg(`Hola ${currentPlayer}, un gusto en conocerte.`, true, 900);
                    resolve();
                });
            });
        }
        
        // 2. Continuación de la historia del campamento (sin IP ni links)
        await showMsg("Ahora todo está listo...", true, 700);
        await showMsg("Ven. Hagamos tu primera fogata.", true, 850);
        await showMsg("*Encienden una hermosa fogata crepitante*", true, 1200);
        await showMsg("Que bonito...", true, 800);
        await showMsg("Espera... ¡APAGA LA FOGATA!", true, 900);
        await showMsg("¡Rápido, hay una fuga de gas! ¡APAGA ESA FOGATA!", true, 1000);
        await showMsg("*Intentas apagar las llamas...*", true, 950);
        await showMsg("*De repente... una explosión te deja inconsciente...*", true, 1400);
        await showMsg("...", true, 800);
        await showMsg("Despierta", true, 700);
        await showMsg("¡DESPIERTA!", true, 700);
        await showMsg("*suspiro* Por fin despertaste.", true, 850);
        await showMsg("Esa fogata no salió tan bien.", true, 900);
        await showMsg("Lo haremos mañana.", true, 800);
        await showMsg("*Escuchas un sonido raro... algo se arrastra*", true, 1100);
        await showMsg("Ey, ¿escuchaste eso?", true, 800);
        await showMsg("¡SON SERPIENTES!", true, 800);
        await showMsg("¡Muchas serpientes venenosas! ¡ESCONDETE!", true, 950);
        await showMsg("¡CORRE!", true, 600);
        
        // Secuencia de escape con serpientes, osos, reintentos
        let caught = false;
        let retryLoop = false;
        
        do {
            caught = false;
            await showMsg("Procedes a correr desesperadamente...", true, 900);
            await showMsg("Pero de repente aparecen osos salvajes también.", true, 1000);
            
            const frasesEscape = [
                "Presiona ACEPTAR para correr más rápido",
                "¡MÁS RÁPIDO!",
                "¡COMO SI NO HUBIERA UN MAÑANA!",
                "¡NO TE RINDAS!",
                "¡MÁS, AHHH!"
            ];
            
            let cancelPressed = false;
            for (let i = 0; i < frasesEscape.length; i++) {
                let userChoice = false;
                await new Promise(async (resolve) => {
                    // mostramos botones OK y Cancelar en cada paso
                    clearInputZone();
                    await writeMessage(msgDiv, frasesEscape[i], 45, true);
                    const btnGroup = document.createElement("div");
                    btnGroup.className = "button-row";
                    const okBtn = document.createElement("button");
                    okBtn.textContent = "⚡ CORRER ⚡";
                    const cancelBtn = document.createElement("button");
                    cancelBtn.textContent = "✋ RENDIRSE";
                    btnGroup.appendChild(okBtn);
                    btnGroup.appendChild(cancelBtn);
                    inputZone.appendChild(btnGroup);
                    
                    const onOk = () => {
                        soundFx.beep();
                        clearInputZone();
                        userChoice = true;
                        cancelPressed = false;
                        resolve();
                    };
                    const onCancel = () => {
                        soundFx.beep();
                        clearInputZone();
                        cancelPressed = true;
                        userChoice = false;
                        resolve();
                    };
                    okBtn.onclick = onOk;
                    cancelBtn.onclick = onCancel;
                });
                if (cancelPressed) {
                    caught = true;
                    break;
                }
                await new Promise(r => setTimeout(r, 500));
            }
            
            if (caught) {
                await showMsg("Te atrapan las criaturas... todo se vuelve oscuro...", true, 1100);
                await showMsg("💀 Has quedado derrotado... 💀", true, 1000);
                let wantRetry = false;
                await new Promise(resolve => {
                    showChoice("¿Quieres reintentar y escapar?", async () => {
                        wantRetry = true;
                        await showMsg("Reintentando... ¡Esta vez lo lograrás!", true, 900);
                        resolve();
                    }, async () => {
                        wantRetry = false;
                        await showMsg("La historia se detiene aquí...", true, 800);
                        resolve();
                    });
                });
                if (!wantRetry) {
                    await showMsg("FIN. (Recarga la página para jugar de nuevo)", true, 2000);
                    return;
                } else {
                    retryLoop = true;
                    continue;
                }
            } else {
                // escapó con éxito
                await showMsg("¡Lograste escapar de las serpientes y los osos!", true, 1000);
                await showMsg("Sales del bosque y llegas a un claro iluminado por la luna.", true, 1100);
                await showMsg("Continuará...", true, 900);
                displayBetaMessage();   // Mensaje Beta al final
                await showMsg("Por ahora la aventura queda aquí.", true, 1100);
                await showMsg("Gracias por jugar, " + currentPlayer + ".", true, 1200);
                break;
            }
        } while (retryLoop);
    }
    
    // ==================== INICIO OFICIAL DEL JUEGO ====================
    async function mainInit() {
        // Secuencia inicial: diálogos iniciales (Hola jugador, nombre, etc)
        await writeMessage(msgDiv, "Hola, Jugador.", 48, true);
        await new Promise(r => setTimeout(r, 700));
        await writeMessage(msgDiv, "Todavía no sé tu nombre...", 48, true);
        await new Promise(r => setTimeout(r, 700));
        await writeMessage(msgDiv, "Escribe tu nombre en el teclado", 48, true);
        await new Promise(r => setTimeout(r, 600));
        
        // Llamar al sistema de nombre
        await new Promise(resolve => {
            askName("", async (nombre) => {
                currentPlayer = nombre;
                await showMsg(`"${currentPlayer}"`, true, 500);
                await showChoice(`¿Estás seguro de que ${currentPlayer} va a ser tu nombre en el juego?`, 
                    async () => {
                        await showMsg("Empezando...", false);
                        await loadingSequence();
                        await startGameStory();
                        resolve();
                    }, 
                    async () => {
                        // reiniciar flujo de nombre
                        await writeMessage(msgDiv, "Entonces, escribe de nuevo tu nombre.", 48, true);
                        await new Promise(resolveName => {
                            askName("", async (newName) => {
                                currentPlayer = newName;
                                await showMsg(`Perfecto, ahora eres ${currentPlayer}`, true, 700);
                                await showMsg("Empezando...", false);
                                await loadingSequence();
                                await startGameStory();
                                resolveName();
                                resolve();
                            });
                        });
                    }
                );
            });
        });
    }
    
    // Arrancar juego con posibilidad de resetear audio y evitar bloqueos
    document.body.addEventListener("click", () => { if(soundFx) soundFx.resume(); });
    mainInit();
</script>
</body>
</html>
